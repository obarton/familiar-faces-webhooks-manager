{% extends "webhooks/base.html" %}

{% block title %}Login — Marketing Ops Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
  <div style="width: 100%; max-width: 380px;">
    <div class="text-center mb-4">
      <h1 style="font-size:1.5rem; font-weight:700; color:var(--heading);">
        <i class="bi bi-graph-up-arrow" style="color:var(--accent);"></i> Marketing Ops Dashboard
      </h1>
      <p class="text-muted" style="font-size:0.875rem;">Sign in to your dashboard</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        {% if form.non_field_errors %}
          <div class="alert alert-danger mb-3">{{ form.non_field_errors }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" style="font-size:0.8125rem; color:var(--text-muted);">Username</label>
            <input type="text" name="username" class="form-control" autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label" style="font-size:0.8125rem; color:var(--text-muted);">Password</label>
            <input type="password" name="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
