<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Webhook Inspector{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root {
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
      --accent: #7c3aed;
      --accent-dim: #4c1d95;
      --surface: #0f0f17;
      --surface-2: #16161f;
      --surface-3: #1e1e2e;
      --border: #2a2a3d;
      --text-muted: #6b7280;
    }

    body {
      font-family: var(--font-sans);
      background: var(--surface);
      color: #e2e8f0;
      min-height: 100vh;
    }

    .navbar {
      background: var(--surface-2) !important;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
    }

    .navbar-brand {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1rem;
      color: #a78bfa !important;
      letter-spacing: -0.02em;
    }

    .navbar-brand .brand-dot {
      color: var(--accent);
    }

    .main-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }

    .page-header h1 {
      font-size: 1.375rem;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0;
    }

    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .card-header {
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .table {
      color: #cbd5e1;
      margin: 0;
    }

    .table > :not(caption) > * > * {
      background: transparent;
      border-color: var(--border);
      padding: 0.75rem 1rem;
    }

    .table thead th {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .table tbody tr:hover > * {
      background: var(--surface-3);
    }

    .method-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2em 0.5em;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .method-post   { background: #1d4ed8; color: #bfdbfe; }
    .method-get    { background: #166534; color: #bbf7d0; }
    .method-put    { background: #92400e; color: #fde68a; }
    .method-patch  { background: #5b21b6; color: #ddd6fe; }
    .method-delete { background: #991b1b; color: #fecaca; }
    .method-other  { background: #374151; color: #d1d5db; }

    .url-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
    }

    .url-box code {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: #a78bfa;
      flex: 1;
      word-break: break-all;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.8125rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-copy:hover { color: #a78bfa; border-color: #a78bfa; }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }

    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.9375rem;
      margin-bottom: 1.25rem;
    }

    .alert {
      border-radius: 8px;
      font-size: 0.875rem;
      border: none;
    }

    .alert-success { background: #052e16; color: #4ade80; }
    .alert-danger  { background: #450a0a; color: #fca5a5; }
    .alert-warning { background: #431407; color: #fb923c; }
    .alert-info    { background: #0c1a2e; color: #7dd3fc; }

    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .breadcrumb-item a { color: #a78bfa; text-decoration: none; }
    .breadcrumb-item a:hover { color: #c4b5fd; }
    .breadcrumb-item.active { color: #94a3b8; }
    .breadcrumb-item + .breadcrumb-item::before { color: var(--border); }

    pre.code-block {
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 480px;
      overflow-y: auto;
    }

    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    a { color: #a78bfa; }
    a:hover { color: #c4b5fd; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }

    .badge-active   { background: #052e16; color: #4ade80; border: 1px solid #166534; font-size: 0.7rem; }
    .badge-inactive { background: #1c1917; color: #78716c; border: 1px solid #44403c; font-size: 0.7rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{% url 'webhooks:endpoint_list' %}">
      <i class="bi bi-reception-4"></i> webhook<span class="brand-dot">.</span>inspector
    </a>
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted" style="font-size:0.8rem">{{ user.username }}</span>
      <form method="post" action="{% url 'logout' %}" class="m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-sm btn-outline-secondary" style="font-size:0.8rem">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </form>
    </div>
    {% endif %}
  </nav>

  <div class="main-container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible mb-4" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
