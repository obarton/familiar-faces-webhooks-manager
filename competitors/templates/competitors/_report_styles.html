<style>
  .md-report { color: var(--text); font-size: 0.9rem; line-height: 1.6; }
  .md-report > :first-child { margin-top: 0; }
  .md-report h2 {
    font-size: 1.05rem; font-weight: 600; color: var(--heading);
    margin: 1.75rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
  }
  .md-report h3 { font-size: 0.95rem; font-weight: 600; color: var(--heading); margin: 1.25rem 0 0.4rem; }
  .md-report p { margin: 0 0 0.75rem; }
  .md-report ul { margin: 0 0 0.9rem; padding-left: 1.25rem; }
  .md-report li { margin-bottom: 0.35rem; }
  .md-report strong { color: var(--heading); }
  .md-report code {
    font-family: var(--font-mono); font-size: 0.82em;
    background: var(--surface-3); color: var(--accent-strong); padding: 0.1em 0.35em; border-radius: 4px;
  }
  .md-report blockquote {
    margin: 0 0 1rem; padding: 0.6rem 0.9rem; border-left: 3px solid var(--accent);
    background: var(--accent-soft); border-radius: 0 6px 6px 0; color: var(--text-muted); font-size: 0.85rem;
  }
  .md-report table {
    width: 100%; border-collapse: collapse; margin: 0.5rem 0 1.25rem; font-size: 0.82rem;
  }
  .md-report th, .md-report td {
    border: 1px solid var(--border); padding: 0.5rem 0.7rem; text-align: left; vertical-align: top;
  }
  .md-report thead th {
    background: var(--surface-3); color: var(--text-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.72rem;
  }
  .md-report tbody tr:hover td { background: var(--surface-3); }
  .md-report em { color: var(--text-subtle); }
</style>
